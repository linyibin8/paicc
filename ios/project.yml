name: PAICC
options:
  bundleIdPrefix: com.evowit
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  developmentLanguage: zh-Hans
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "N3G45G5H74"
    CODE_SIGN_STYLE: Manual
    CODE_SIGNING_REQUIRED: "NO"
    CODE_SIGNING_ALLOWED: "NO"

targets:
  PAICC:
    type: application
    platform: iOS
    sources:
      - path: PAICC/Sources
      - path: PAICC/Resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.evowit.paicc
        INFOPLIST_FILE: PAICC/Sources/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: NO
    entitlements:
      path: PAICC/Sources/App/PAICC.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true

packages:
  SnapKit:
    url: https://github.com/SnapKit/SnapKit.git
    from: "5.7.0"
  Alamofire:
    url: https://github.com/Alamofire/Alamofire.git
    from: "5.9.0"