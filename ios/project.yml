name: PAICC
options:
  bundleIdPrefix: com.evowit
  deploymentTarget:
    iOS: "16.0"
  xcodeVersion: "16.0"
  developmentLanguage: zh-Hans
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "2026061301"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "N3G45G5H74"
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"

targets:
  PAICC:
    type: application
    platform: iOS
    sources:
      - path: PAICC/Sources
        type: group
        excludes:
          - "**/.DS_Store"
      - path: PAICC/Resources
        type: group
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.evowit.paicc
        PRODUCT_NAME: PAICC
        INFOPLIST_FILE: PAICC/Sources/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks"
        TARGETED_DEVICE_FAMILY: "1,2"
        SWIFT_EMIT_LOC_STRINGS: YES
        GENERATE_INFOPLIST_FILE: NO
        ALWAYS_SEARCH_USER_PATHS: NO
        DEVELOPMENT_TEAM: N3G45G5H74
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Distribution: Shenzhen Youdezhe Technology Co., Ltd. (N3G45G5H74)"
        CODE_SIGNING_ALLOWED: YES
        CODE_SIGNING_REQUIRED: YES

packages:
  SnapKit:
    url: https://github.com/SnapKit/SnapKit.git
    from: "5.7.0"
  Alamofire:
    url: https://github.com/Alamofire/Alamofire.git
    from: "5.9.0"
