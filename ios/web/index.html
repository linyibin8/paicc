<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAI-CC - 学习陪伴助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            text-align: center;
            color: white;
            padding: 40px;
        }
        h1 { font-size: 3em; margin-bottom: 20px; }
        .subtitle { font-size: 1.5em; opacity: 0.9; margin-bottom: 40px; }
        .app-icon {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 30px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 60px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            max-width: 800px;
            margin: 40px auto;
            text-align: left;
        }
        .feature {
            background: rgba(255,255,255,0.2);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
        }
        .feature h3 { margin-bottom: 10px; }
        .feature p { opacity: 0.8; font-size: 0.9em; }
        .download {
            margin-top: 40px;
        }
        .btn {
            display: inline-block;
            background: white;
            color: #667eea;
            padding: 15px 40px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2em;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .status {
            margin-top: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.15);
            border-radius: 15px;
            display: inline-block;
        }
        .status-dot {
            display: inline-block;
            width: 12px;
            height: 12px;
            background: #4ade80;
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="app-icon">📚</div>
        <h1>PAI-CC</h1>
        <p class="subtitle">你的智能学习陪伴助手</p>
        
        <div class="features">
            <div class="feature">
                <h3>📸 智能拍题</h3>
                <p>拍摄题目，自动识别并解析答案</p>
            </div>
            <div class="feature">
                <h3>🎤 语音问答</h3>
                <p>语音指令，随时提问，智能回复</p>
            </div>
            <div class="feature">
                <h3>✋ 手势交互</h3>
                <p>手势控制，指向即答，无需点击</p>
            </div>
            <div class="feature">
                <h3>📊 错题管理</h3>
                <p>自动收集错题，智能复习提醒</p>
            </div>
        </div>
        
        <div class="download">
            <p style="margin-bottom: 20px; opacity: 0.8;">即将发布 App Store</p>
            <a href="#" class="btn">敬请期待</a>
        </div>
        
        <div class="status">
            <span class="status-dot"></span>
            服务运行中 - API 版本 2.0.0
        </div>
    </div>
</body>
</html>
