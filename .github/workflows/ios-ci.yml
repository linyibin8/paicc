name: iOS CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-15
    env:
      APP_NAME: PAI-CC
      APP_BUNDLE_ID: com.evowit.paicc
      APP_STORE_CONNECT_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
      APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
      APP_STORE_CONNECT_API_KEY_PATH: ${{ github.workspace }}/private_keys/AuthKey_${{ secrets.APP_STORE_CONNECT_KEY_ID }}.p8
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
      P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Set up XcodeGen
        run: brew install xcodegen

      - name: Prepare signing
        run: bash scripts/setup_ci_signing.sh

      - name: Build
        run: xcodebuild -project ios/PAICC.xcodeproj -scheme PAICC -configuration Debug -destination 'platform=iOS Simulator,name=iPhone 16' build CODE_SIGN_STYLE=Manual CODE_SIGN_IDENTITY="Apple Distribution: Shenzhen Youdezhe Technology Co., Ltd. (N3G45G5H74)" DEVELOPMENT_TEAM=N3G45G5H74