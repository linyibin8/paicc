# PAI-CC Nginx 反向代理配置

upstream backend_api {
    server 100.64.0.13:8027;
}

upstream ollama_ai {
    server 100.64.0.5:39000;
}

upstream tts_service {
    server 100.64.0.13:8880;
}

server {
    listen 80;
    server_name api.pai-cc.evowit.com;
    
    location / {
        proxy_pass http://backend_api;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # WebSocket 支持
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
}

server {
    listen 80;
    server_name ai.pai-cc.evowit.com;
    
    location / {
        proxy_pass http://ollama_ai;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

server {
    listen 80;
    server_name tts.pai-cc.evowit.com;
    
    location / {
        proxy_pass http://tts_service;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
