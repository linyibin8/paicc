# PAI-CC Nginx 反向代理配置

# 上游服务定义
upstream pai_cc_backend {
    server 127.0.0.1:8029;
}

upstream pai_cc_tts {
    server 127.0.0.1:8880;
}

upstream pai_cc_ai {
    server 100.64.0.5:39000;
}

# HTTP 重定向到 HTTPS（需要配置 SSL）
server {
    listen 80;
    server_name api.pai-cc.evowit.com tts.pai-cc.evowit.com ai.pai-cc.evowit.com;
    return 301 https://$host$request_uri;
}

# API 服务
server {
    listen 443 ssl http2;
    server_name api.pai-cc.evowit.com;

    # SSL 证书（使用 Let's Encrypt）
    ssl_certificate /etc/nginx/ssl/api.pai-cc.evowit.com.pem;
    ssl_certificate_key /etc/nginx/ssl/api.pai-cc.evowit.com.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://pai_cc_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
    }

    # WebSocket 支持
    location /ws {
        proxy_pass http://pai_cc_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # 静态文件
    location /uploads {
        alias /home/ydz/projects/pai-cc/uploads;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# TTS 服务
server {
    listen 443 ssl http2;
    server_name tts.pai-cc.evowit.com;

    ssl_certificate /etc/nginx/ssl/tts.pai-cc.evowit.com.pem;
    ssl_certificate_key /etc/nginx/ssl/tts.pai-cc.evowit.com.key;

    location / {
        proxy_pass http://pai_cc_tts;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# AI 模型服务
server {
    listen 443 ssl http2;
    server_name ai.pai-cc.evowit.com;

    ssl_certificate /etc/nginx/ssl/ai.pai-cc.evowit.com.pem;
    ssl_certificate_key /etc/nginx/ssl/ai.pai-cc.evowit.com.key;

    location / {
        proxy_pass http://pai_cc_ai;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}